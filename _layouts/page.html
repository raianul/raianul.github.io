<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7XFBFZ3NK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7XFBFZ3NK1', { anonymize_ip: true });
  </script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #5b4de8;
      --accent-soft: #5b4de812;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      line-height: 1.75;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-content h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2.5rem 0 0.75rem;
    }
    .page-content h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.8rem 0 0.5rem;
      color: var(--muted);
    }
    .page-content p { margin-bottom: 1rem; font-size: 0.95rem; }
    .page-content ul, .page-content ol {
      margin: 0.75rem 0 1rem 1.5rem;
      font-size: 0.95rem;
    }
    .page-content li { margin-bottom: 0.3rem; }
    .page-content a { color: var(--accent); text-decoration: none; }
    .page-content a:hover { text-decoration: underline; }
    .page-content strong { font-weight: 600; }
    .page-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }
    .page-content .de-block {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 1.2rem 1.5rem;
      border-radius: 0 6px 6px 0;
      margin: 2rem 0;
      font-size: 0.9rem;
    }
    .page-content .de-block h3 { color: var(--accent); margin-top: 0; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
    }
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .footer-credit {
      color: var(--muted);
      font-size: 0.82rem;
    }
    .footer-credit a { color: var(--accent); text-decoration: none; }
    .footer-links {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--muted);
      font-size: 0.78rem;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .page-wrap { padding: 2rem 1.2rem 4rem; }
      .page-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">raian<span>.</span>xyz</a>
    <a href="/" class="nav-back">← Home</a>
  </nav>

  <div class="page-wrap">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    <div class="page-content">
      {{ content }}
    </div>
  </div>

  {% include footer.html %}

</body>
</html>
