<!DOCTYPE html>
<html lang="bn">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8QGCTH06MZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8QGCTH06MZ');
  </script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }} | raian.xyz</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #5b4de8;
      --accent-soft: #5b4de812;
      --code-bg: #f6f8fa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hind Siliguri', 'Inter', sans-serif;
      min-height: 100vh;
      line-height: 1.75;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    .article-header {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 2rem 2.5rem;
    }
    .article-series {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1.2rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }
    .article-title {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.5px;
      margin-bottom: 1rem;
    }
    .article-meta {
      display: flex;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
    }

    .article-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .article-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    .article-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .article-content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 2rem 0 0.8rem;
      color: var(--text);
    }
    .article-content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.6rem;
      color: var(--muted);
    }

    .article-content p {
      margin-bottom: 1.2rem;
      font-size: 1.05rem;
    }

    .article-content strong { color: var(--text); font-weight: 600; }

    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
    }
    .article-content th {
      background: var(--surface);
      color: var(--accent);
      font-weight: 600;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    .article-content td {
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .article-content tr:nth-child(even) td { background: #fafafa; }

    .article-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
    }
    .article-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88em;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      color: #5b4de8;
    }
    .article-content pre code { background: none; padding: 0; color: inherit; }

    .article-content .mermaid {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid var(--border);
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    .article-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 2rem 0;
      padding: 1rem 1.5rem;
      background: var(--accent-soft);
      border-radius: 0 8px 8px 0;
      color: var(--muted);
      font-style: italic;
    }

    .article-content ul, .article-content ol {
      margin: 1rem 0 1.2rem 1.5rem;
    }
    .article-content li { margin-bottom: 0.4rem; }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .article-title { font-size: 1.6rem; }
      .article-content { padding: 0 1.2rem 4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">raian<span>.</span>xyz</a>
    <a href="/" class="nav-back">← সব লেখা</a>
  </nav>

  <header class="article-header">
    <div class="article-series">{{ page.series }}</div>
    <h1 class="article-title">{{ page.title }}</h1>
    <div class="article-meta">
      <span>রাইয়ান</span>
      <span>·</span>
      <span>{{ page.date_bn }}</span>
    </div>
  </header>

  <article class="article-content">
    {{ content }}
  </article>

  <footer>
    <p>বানিয়েছে <a href="https://github.com/raianul">রাইয়ান</a> · <a href="https://raian.xyz">raian.xyz</a></p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    document.querySelectorAll('pre code.language-mermaid').forEach(el => {
      const pre = el.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      pre.parentElement.replaceChild(div, pre);
    });
    mermaid.initialize({ startOnLoad: true, theme: 'base' });
  </script>
  <script>
    document.querySelectorAll('pre code:not(.language-mermaid)').forEach(block => {
      hljs.highlightElement(block);
    });
  </script>

</body>
</html>
